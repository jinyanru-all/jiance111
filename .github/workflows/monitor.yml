name: 联盟新闻定时抓取

on:
  schedule:
    # 每 5 分钟抓取一次
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm install

      - name: 执行抓取
        run: node monitor.js --once

      - name: 提交并推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet && git diff --staged --quiet; then
            echo "无变更"
          else
            git add data/news.json data/seen.json
            git commit -m "📡 自动抓取 $(date -u '+%m-%d %H:%M')"
            git push
          fi
